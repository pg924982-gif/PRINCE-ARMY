    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top, #1b1035 0%, #0b0b14 55%, #050507 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
        }

        .wrapper {
            width: 100%;
            max-width: 400px;
        }

        .logo {
            font-size: 2.1rem;
            font-weight: 800;
            margin-bottom: 14px;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, #ff4fd8, #7d7bff, #45d7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #b7bdd1;
            margin-bottom: 34px;
            font-weight: 500;
        }

        .btn {
            display: inline-block;
            width: 100%;
            text-decoration: none;
            background: linear-gradient(90deg, #ff4fd8, #7d7bff);
            color: #fff;
            font-weight: 800;
            font-size: 1.08rem;
            padding: 17px 24px;
            border-radius: 18px;
            box-shadow: 0 8px 28px rgba(125, 123, 255, 0.35);
            transition: transform .15s ease, opacity .15s ease;
            border: none;
            cursor: pointer;
        }

        .btn:active {
            transform: scale(.98);
            opacity: .92;
        }

        .footer {
            margin-top: 26px;
            font-size: .75rem;
            color: #666d85;
            font-weight: 500;
        }

        @media (max-width:480px) {
            .logo {
                font-size: 1.9rem;
            }
            .subtitle {
                font-size: 1rem;
            }
            .btn {
                font-size: 1rem;
                padding: 16px 20px;
            }
        }
    </style>
